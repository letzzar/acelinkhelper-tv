name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk acelinkhelper-tv-${{ github.ref_name }}.apk
          cp app/build/outputs/apk/release/app-release.apk acelinkhelper-android-${{ github.ref_name }}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            acelinkhelper-tv-${{ github.ref_name }}.apk
            acelinkhelper-android-${{ github.ref_name }}.apk
          name: AcelinkHelper TV ${{ github.ref_name }}
          generate_release_notes: true
